name: SIA CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-lint:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt
      - name: Lint with Ruff
        run: |
          cd api
          ruff check .

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint || true # Remove true when strict linting ready
      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true

  docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t sia-backend:test ./api
      - name: Build Frontend Image
        run: docker build -t sia-frontend:test ./frontend
